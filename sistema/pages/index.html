<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catálogo | Sistema</title>

    <!-- CSS -->
    <!-- <link rel="stylesheet" href="/css/style.css"> -->
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/catalogo.css">
    <link rel="icon" href="/img/favicon.ico">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="pagina-catalogo">

    <!-- ===== HEADER ===== -->
    <header>
        <nav class="navbar navbar-expand-lg bg-light fixed-top">
            <div class="container">

                <a class="navbar-brand" href="#">
                    <img src="/img/karinaModaLogo.png" alt="Logo" class="logo">
                </a>

                <button class="navbar-toggler ms-auto" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarNav">

                    <!-- BUSCA -->
                    <div class="busca-catalogo mx-auto">
                        <div class="busca-box">
                            <input type="text" id="buscarProduto" placeholder="Buscar produto...">
                            <button onclick="filtrarCatalogo()">Buscar</button>
                        </div>
                    </div>

                    <ul class="navbar-nav ms-auto align-items-center">

                        <li class="nav-item">
                            <a class="nav-link carrinho-topo" href="javascript:void(0)" onclick="abrirCarrinho()">
                                🛒 <span id="contadorCarrinho">0</span>
                            </a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" href="#">Início</a>
                        </li>

                        <li class="nav-item">
                            <a href="#" class="nav-link btn-area" onclick="abrirModal('modalLogin')">
                                🔐 Acesso Restrito
                            </a>
                        </li>

                    </ul>

                </div>
            </div>
        </nav>
    </header>


    <!-- ===== CATÁLOGO ===== -->
    <section id="produtos" class="container mt-5">

        <h2 class="text-center mt-5 mb-4">Nosso Catálogo</h2>

        <div class="row" id="catalogoProdutos">
            <!-- Produtos via JS -->
        </div>

    </section>


    <!-- ===== MODAL LOGIN ===== -->
    <div id="modalLogin" class="modal-sistema hidden">
        <div class="modal-content-sistema modal-sm">

            <h3>Acesso ao Sistema</h3>

            <input type="email" id="login_email" class="form-control mb-2" placeholder="Email">
            <input type="password" id="login_senha" class="form-control mb-3" placeholder="Senha">

            <button class="btn btn-primary" onclick="fazerLogin()">Entrar</button>
            <button class="btn btn-secondary" onclick="fecharModal('modalLogin')">Cancelar</button>

        </div>
    </div>


    <!-- ===== CARRINHO ===== -->
    <div id="overlayCarrinho" class="overlay hidden" onclick="fecharCarrinho()"></div>

    <div id="carrinhoLateral" class="carrinho-lateral">

        <div class="carrinho-header">
            <h4>🛒 Seu Carrinho</h4>
            <button onclick="fecharCarrinho()">✕</button>
        </div>

        <div id="listaCarrinho" class="carrinho-body"></div>

        <!-- <div class="carrinho-footer">
            <button onclick="abrirModal('modalPedido')">Finalizar Pedido</button>
        </div> -->

        <div class="carrinho-footer">
    <div class="carrinho-total" id="totalCarrinho">
        Total: R$ 0,00
    </div>

    <button onclick="abrirModal('modalPedido')">
        Finalizar Pedido
    </button>
</div>

    </div>


    <!-- ===== MODAL PEDIDO ===== -->
    <div id="modalPedido" class="modal-sistema hidden">

        <div class="modal-content-sistema modal-sm">

            <h3>Finalizar Pedido</h3>

            <input type="text" id="nomeCliente" placeholder="Seu nome" class="form-control mb-2">
            <input type="text" id="telefoneCliente" placeholder="Telefone" class="form-control mb-2">

            <select id="formaPagamento" class="form-control mb-3">
                <option value="">Forma de pagamento</option>
                <option>Dinheiro</option>
                <option>PIX</option>
                <option>Cartão</option>
            </select>

            <button onclick="finalizarPedido()" class="btn btn-success">Confirmar Pedido</button>
            <button onclick="fecharModal('modalPedido')" class="btn btn-secondary">Cancelar</button>

        </div>

    </div>


    <!-- ===== GALERIA ===== -->
    <div id="galeriaModal" class="galeria-modal">
        <span class="fechar" onclick="fecharGaleria()">×</span>
        <button class="nav prev" onclick="mudarImagem(-1)">❮</button>
        <img id="imagemGaleria">
        <button class="nav next" onclick="mudarImagem(1)">❯</button>
    </div>


    <!-- ===== MODAL MENSAGEM ===== -->
    <div id="modalMensagem" class="modal-sistema hidden">
        <div class="modal-content-sistema modal-small">

            <h3 id="modalMensagemTitulo">Mensagem</h3>
            <p id="modalMensagemTexto"></p>

            <button id="modalBtnConfirmar" class="btn btn-primary">OK</button>

        </div>
    </div>


    <!-- ===== SCRIPTS ===== -->

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- SEUS JS -->
    <script src="/js/scripts.js"></script>
    <script src="/js/indexCatalogo.js"></script>

</body>

</html>
