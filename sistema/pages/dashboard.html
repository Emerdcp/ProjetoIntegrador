<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Dashboard | Sistema</title>

    <link rel="stylesheet" href="/css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="layout">
        <aside id="menu"></aside>
        <div class="main-area">
            <header id="header"></header>

            <main class="container mt-4">
        
                <h2 class="mb-4">📊 Dashboard Financeiro</h2>
        
                <!-- CARDS -->
                <div class="row g-3 mb-4">
        
                    <div class="col-md-3">
                        <div class="card shadow-sm p-3">
                            <h6>💰 Faturamento</h6>
                            <h4 id="faturamento">R$ 0,00</h4>
                        </div>
                    </div>
        
                    <div class="col-md-3">
                        <div class="card shadow-sm p-3">
                            <h6>🛒 Pedidos</h6>
                            <h4 id="pedidos">0</h4>
                        </div>
                    </div>
        
                    <div class="col-md-3">
                        <div class="card shadow-sm p-3">
                            <h6>📦 Produtos</h6>
                            <h4 id="produtos">0</h4>
                        </div>
                    </div>
        
                    <div class="col-md-3">
                        <div class="card shadow-sm p-3">
                            <h6>👥 Clientes</h6>
                            <h4 id="clientes">0</h4>
                        </div>
                    </div>
        
                </div>
        
                <!-- TABELA -->
                <div class="card p-3 shadow-sm">
                    <h5>Últimos Pedidos</h5>
        
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Cliente</th>
                                <th>Valor</th>
                                <th>Data</th>
                            </tr>
                        </thead>
                        <tbody id="listaPedidos"></tbody>
                    </table>
                </div>
        
            </main>

            <div id="footer"></div>

        </div>
    </div>

    <script src="/js/layout.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/dashboard.js"></script>

</body>
</html>
