<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Categorias | Sistema</title>

    <!-- CSS GLOBAL -->
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/sistema.css">
    <link rel="stylesheet" href="/css/categoria.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="pagina-sistema">
    <div class="layout">

        <aside id="menu"></aside>

        <div class="main-area">

            <header id="header"></header>

            <main class="container mt-4">

                <!-- HEADER -->
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h2>Categorias</h2>
                    <button class="btn btn-primary" onclick="abrirModalCategoria()">
                        + Nova
                    </button>
                </div>

                <!-- TABELA -->
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Ações</th>
                        </tr>
                    </thead>

                    <tbody id="listaCategorias"></tbody>
                </table>

            </main>

            <!-- FOOTER -->
            <div id="footer"></div>

        </div>
    </div>

    <!-- ================= MODAL ================= -->
    <div id="modalCategoria" class="modal-sistema hidden">

        <div class="modal-content-sistema modal-sm">

            <h4 id="tituloModalCategoria">Categoria</h4>

            <input type="hidden" id="idCategoria">

            <input type="text" id="cat_nome" class="form-control mb-2" placeholder="Nome da categoria">

            <button onclick="salvarCategoria()" class="btn btn-success w-100">
                Salvar
            </button>

            <button onclick="fecharModalCategoria()" class="btn btn-secondary w-100 mt-2">
                Cancelar
            </button>

        </div>

    </div>

    <!-- ================= CONFIRMAÇÃO ================= -->
    <div id="modalConfirmacao" class="modal-sistema hidden">
        <div class="modal-content-sistema modal-sm">

            <h4 id="confirmTitulo">Confirmação</h4>
            <p id="confirmTexto"></p>

            <button id="btnConfirmar" class="btn btn-danger w-100">Confirmar</button>
            <button onclick="fecharConfirmacao()" class="btn btn-secondary w-100 mt-2">Cancelar</button>

        </div>
    </div>

    <!-- ================= MENSAGEM ================= -->
    <div id="modalMensagem" class="modal-sistema hidden">
        <div class="modal-content-sistema modal-sm">

            <h4 id="msgTitulo">Mensagem</h4>
            <p id="msgTexto"></p>

            <button onclick="fecharMensagem()" class="btn btn-primary w-100">OK</button>

        </div>
    </div>

    <!-- JS -->
    <script src="/js/auth.js"></script>
    <script src="/js/layout.js"></script>
    <script src="/js/scripts.js"></script>
    <script src="/js/cadastroCategoria.js"></script>

</body>

</html>
