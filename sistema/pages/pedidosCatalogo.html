<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Pedidos do Catálogo</title>

    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/sistema.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="pagina-sistema">

<div class="layout">

    <!-- MENU -->
    <aside id="menu"></aside>

    <div class="main-area">

        <!-- HEADER -->
        <header id="header"></header>

        <main class="container mt-4">

            <!-- TOPO -->
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h1>Pedidos do Catálogo</h1>
            </div>

            <!-- TABELA -->
            <div class="card-list">

                <table class="table align-middle">

                    <thead>
                        <tr>
                            <th>Cliente</th>
                            <th>Telefone</th>
                            <th>Total</th>
                            <th>Data</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>

                    <tbody id="listarCatalogoVendas"></tbody>

                </table>

            </div>

        </main>

        <div id="footer"></div>
    </div>
</div>

<!-- MODAL ITENS -->
<div id="modalItens" class="modal-sistema hidden">
    <div class="modal-content-sistema modal-md">

        <h3>Itens do Pedido</h3>

        <div id="listaItensPedido"></div>

        <button onclick="fecharModalItens()" class="btn btn-secondary w-100 mt-3">
            Fechar
        </button>

    </div>
</div>

<!-- MENSAGEM -->
<div id="modalMensagem" class="modal-sistema hidden">
    <div class="modal-content-sistema modal-sm">
        <h4 id="msgTitulo"></h4>
        <p id="msgTexto"></p>

        <button onclick="fecharMensagem()" class="btn btn-primary w-100">
            OK
        </button>
    </div>
</div>

<!-- SCRIPTS -->
<script src="/js/auth.js"></script>
<script src="/js/layout.js"></script>
<script src="/js/scripts.js"></script>
<script src="/js/pedidosCatalogo.js"></script>

<script>
    carregarMenu();
    carregarHeader();
    carregarFooter();
</script>

</body>
</html>
