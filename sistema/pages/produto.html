<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Produtos | Sistema</title>

    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/sistema.css">
    <link rel="stylesheet" href="/css/produto.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="pagina-sistema">

    <div class="layout">

        <aside id="menu"></aside>

        <div class="main-area">

            <header id="header"></header>

            <main class="container mt-4">

                <!-- TOPO -->
                <div class="d-flex justify-content-between align-items-center mb-3">

                    <h1>Produtos</h1>

                    <div class="d-flex gap-2">
                        <button class="btn btn-primary" onclick="abrirModalProduto()">+ Novo</button>
                        <button class="btn btn-secondary" onclick="abrirFiltro()">Filtrar</button>
                    </div>

                </div>

                <!-- LISTA -->
                <div class="card-list">

                    <table class="table align-middle">

                        <thead>
                            <tr>
                                <th>Nome</th>
                                <th>Categoria</th>
                                <th>Preço</th>
                                <th>Estoque</th>
                                <th>Imagem</th>
                                <th>Status</th>
                                <th>Ações</th>
                            </tr>
                        </thead>

                        <tbody id="listaProdutos"></tbody>

                    </table>

                </div>

            </main>

            <div id="footer"></div>
        </div>
    </div>

    <!-- MODAL PRODUTO -->
    <div id="modalProduto" class="modal-sistema hidden">
        <div class="modal-content-sistema modal-md">

            <h3 id="tituloModalProduto">Novo Produto</h3>

            <input type="hidden" id="idProduto">

            <div class="row g-3">

                <div class="col-md-6">
                    <label>Nome</label>
                    <input id="pro_nome" class="form-control">
                </div>

                <div class="col-md-6">
                    <label>Categoria</label>
                    <select id="pro_categoria" class="form-control"></select>
                </div>

                <div class="col-md-4">
                    <label>Status</label>
                    <select id="pro_status" class="form-control">
                        <option value="A">Ativo</option>
                        <option value="I">Inativo</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label>Controle Estoque</label>
                    <select id="pro_controle_estoque" class="form-control">
                        <option value="S">Sim</option>
                        <option value="N">Não</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label>Unidade</label>
                    <select id="pro_unidade" class="form-control">
                        <option value="UN">UN</option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label>Código Fabricante</label>
                    <input id="pro_codfabricante" class="form-control">
                </div>

                <div class="col-md-6">
                    <label>Localização</label>
                    <input id="pro_localizacao" class="form-control">
                </div>

                <div class="col-md-4">
                    <label>Preço Venda</label>
                    <input id="pro_preco_venda" type="number" class="form-control">
                </div>

                <div class="col-md-4">
                    <label>Preço Custo</label>
                    <input id="pro_preco_custo" type="number" class="form-control">
                </div>

                <div class="col-md-4">
                    <label>Estoque</label>
                    <input id="pro_estoque" type="number" class="form-control">
                </div>

                <div class="col-md-6">
                    <label>Envia Catálogo</label>
                    <select id="pro_envia_catalogo" class="form-control">
                        <option value="N">Não</option>
                        <option value="S">Sim</option>
                    </select>
                </div>

                <div class="col-md-12">
                    <label>Imagens</label>
                    <input type="file" id="pro_imagens" multiple class="form-control">
                </div>

            </div>

            <div class="modal-actions">
                <button onclick="salvarProduto()" class="btn btn-success w-100">Salvar</button>
                <button onclick="fecharModalProduto()" class="btn btn-secondary w-100 mt-2">Cancelar</button>
            </div>

        </div>
    </div>


    <!-- ================= MENSAGEM ================= -->
    <div id="modalMensagem" class="modal-sistema hidden">
        <div class="modal-content-sistema modal-sm">

            <h4 id="msgTitulo">Mensagem</h4>
            <p id="msgTexto"></p>

            <button onclick="fecharMensagem()" class="btn btn-primary w-100">OK</button>

        </div>
    </div>

    <div id="modalConfirmacao" class="modal-sistema hidden">
        <div class="modal-content-sistema modal-sm">

            <h4>Confirmação</h4>
            <p id="confirmTexto"></p>

            <button id="btnConfirmar" class="btn btn-danger w-100">Confirmar</button>
            <button onclick="fecharConfirmacao()" class="btn btn-secondary w-100 mt-2">Cancelar</button>

        </div>
    </div>

    <!-- ================= FILTRO ================= -->
    <div id="modalFiltro" class="modal-sistema hidden">
        <div class="modal-content-sistema modal-sm">

            <h4>Filtrar Produtos</h4>

            <input type="text" id="filtroNome" class="form-control mb-2" placeholder="Nome">

            <select id="filtroCategoria" class="form-control mb-2">
                <option value="">Todas Categorias</option>
            </select>

            <select id="filtroStatus" class="form-control mb-2">
                <option value="">Todos</option>
                <option value="A">Ativo</option>
                <option value="I">Inativo</option>
            </select>

            <button onclick="aplicarFiltro()" class="btn btn-primary w-100">Aplicar</button>
            <button onclick="fecharFiltro()" class="btn btn-secondary w-100 mt-2">Cancelar</button>

        </div>
    </div>

    <script src="/js/auth.js"></script>
    <script src="/js/layout.js"></script>
    <script src="/js/scripts.js"></script>
    <script src="/js/cadastroProduto.js"></script>

    <script>
        carregarMenu();
        carregarHeader();
        carregarFooter();
    </script>

</body>

</html>
