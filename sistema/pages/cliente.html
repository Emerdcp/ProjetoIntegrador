<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Clientes | Sistema</title>

    <!-- CSS GLOBAL -->
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/sistema.css">

    <!-- OPCIONAL: CSS específico -->
    <link rel="stylesheet" href="/css/cliente.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="pagina-sistema">
    <div class="layout">

        <aside id="menu"></aside>

        <div class="main-area">

            <header id="header"></header>

            <main class="container mt-4">

                <!-- HEADER -->
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h2>Clientes</h2>
                    <button class="btn btn-primary" onclick="abrirModalCliente()">+ Novo</button>
                    <button class="btn btn-secondary" onclick="abrirFiltro()">Filtrar</button>
                </div>

                <!-- TABELA -->
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Telefone</th>
                            <th>Email</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>

                    <tbody id="listaClientes"></tbody>
                </table>

            </main>

            <!-- FOOTER -->
            <div id="footer"></div>

        </div>
    </div>


    <!-- ================= MODAL CLIENTE ================= -->
    <div id="modalCliente" class="modal-sistema hidden">

        <div class="modal-content-sistema modal-md">

            <h4 id="tituloModalCliente">Cliente</h4>

            <input type="hidden" id="idCliente">

            <input type="text" id="cli_nome" class="form-control mb-2" placeholder="Nome">
            <input type="text" id="cli_documento" class="form-control mb-2" placeholder="CPF / CNPJ">

            <input type="text" id="cli_telefone" class="form-control mb-2" placeholder="Telefone">
            <input type="email" id="cli_email" class="form-control mb-2" placeholder="Email">

            <select id="cli_status" class="form-control mb-2">
                <option value="A">Ativo</option>
                <option value="I">Inativo</option>
            </select>

            <hr>

            <input type="text" id="cli_cep" class="form-control mb-2" placeholder="CEP">
            <input type="text" id="cli_endereco" class="form-control mb-2" placeholder="Endereço">
            <input type="text" id="cli_numero" class="form-control mb-2" placeholder="Número">
            <input type="text" id="cli_bairro" class="form-control mb-2" placeholder="Bairro">
            <input type="text" id="cli_cidade" class="form-control mb-2" placeholder="Cidade">
            <input type="text" id="cli_estado" class="form-control mb-2" placeholder="Estado">

            <button onclick="salvarCliente()" class="btn btn-success w-100">Salvar</button>
            <button onclick="fecharModalCliente()" class="btn btn-secondary w-100 mt-2">Cancelar</button>

        </div>

    </div>

    <div id="modalFiltro" class="modal-sistema hidden">
        <div class="modal-content-sistema modal-sm">

            <h4>Filtrar Clientes</h4>

            <input type="text" id="filtroNome" class="form-control mb-2" placeholder="Nome">
            <input type="text" id="filtroTelefone" class="form-control mb-2" placeholder="Telefone">

            <select id="filtroStatus" class="form-control mb-2">
                <option value="">Todos</option>
                <option value="A">Ativo</option>
                <option value="I">Inativo</option>
            </select>

            <button onclick="aplicarFiltro()" class="btn btn-primary w-100">Aplicar</button>
            <button onclick="fecharFiltro()" class="btn btn-secondary w-100 mt-2">Cancelar</button>

        </div>
    </div>


    <!-- ================= CONFIRMAÇÃO ================= -->
    <div id="modalConfirmacao" class="modal-sistema hidden">
        <div class="modal-content-sistema modal-sm">

            <h4 id="confirmTitulo">Confirmação</h4>
            <p id="confirmTexto"></p>

            <button id="btnConfirmar" class="btn btn-danger w-100">Confirmar</button>
            <button onclick="fecharConfirmacao()" class="btn btn-secondary w-100 mt-2">Cancelar</button>

        </div>
    </div>

    <!-- ================= HISTÓRICO ================= -->
    <div id="modalHistorico" class="modal-sistema hidden">
        <div class="modal-content-sistema modal-md">

            <h4>Histórico</h4>

            <div id="listaHistorico"></div>

            <button onclick="fecharHistorico()" class="btn btn-secondary w-100 mt-2">Fechar</button>

        </div>
    </div>

    <!-- ================= MENSAGEM ================= -->
    <div id="modalMensagem" class="modal-sistema hidden">
        <div class="modal-content-sistema modal-sm">

            <h4 id="msgTitulo">Mensagem</h4>
            <p id="msgTexto"></p>

            <button onclick="fecharMensagem()" class="btn btn-primary w-100">OK</button>

        </div>
    </div>



    <!-- JS -->
    <script src="/js/auth.js"></script>
    <script src="/js/layout.js"></script>
    <script src="/js/scripts.js"></script> <!-- 🔥 ESTE FALTAVA -->
    <script src="/js/cadastroCliente.js"></script>

</body>

</html>
