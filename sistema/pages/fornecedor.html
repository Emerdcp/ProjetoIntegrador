<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Fornecedores | Sistema</title>

    <!-- CSS -->
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/sistema.css">
    <link rel="stylesheet" href="/css/fornecedor.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="pagina-sistema">

    <div class="layout">

        <aside id="menu"></aside>

        <div class="main-area">

            <header id="header"></header>

            <main class="container mt-4">

                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h2>Fornecedores</h2>
                    <button class="btn btn-primary" onclick="abrirModalFornecedor()">+ Novo</button>
                    <button class="btn btn-secondary" onclick="abrirFiltroFornecedor()">Filtrar</button>
                </div>

                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Telefone</th>
                            <th>Email</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="listaFornecedores"></tbody>
                </table>

            </main>

            <div id="footer"></div>

        </div>
    </div>

    <!-- MODAL -->
    <div id="modalFornecedor" class="modal-sistema hidden">
        <div class="modal-content-sistema modal-md">

            <h4 id="tituloModalFornecedor">Fornecedor</h4>

            <input type="hidden" id="idFornecedor">

            <input type="text" id="for_nome" class="form-control mb-2" placeholder="Nome">
            <input type="text" id="for_documento" class="form-control mb-2" placeholder="CPF/CNPJ">

            <input type="text" id="for_telefone" class="form-control mb-2" placeholder="Telefone">
            <input type="email" id="for_email" class="form-control mb-2" placeholder="Email">

            <select id="for_status" class="form-control mb-2">
                <option value="A">Ativo</option>
                <option value="B">Bloqueado</option>
                <option value="I">Inativo</option>
            </select>

            <hr>

            <input type="text" id="for_cep" class="form-control mb-2" placeholder="CEP">
            <input type="text" id="for_endereco" class="form-control mb-2" placeholder="Endereço">
            <input type="text" id="for_numero" class="form-control mb-2" placeholder="Número">
            <input type="text" id="for_bairro" class="form-control mb-2" placeholder="Bairro">
            <input type="text" id="for_cidade" class="form-control mb-2" placeholder="Cidade">
            <input type="text" id="for_estado" class="form-control mb-2" placeholder="Estado">

            <button onclick="salvarFornecedor()" class="btn btn-success w-100">Salvar</button>
            <button onclick="fecharModalFornecedor()" class="btn btn-secondary w-100 mt-2">Cancelar</button>

        </div>
    </div>
    3ewa
    <!-- Modal de mensagem -->
    <div id="modalMensagem" class="modal-sistema hidden">
        <div class="modal-content-sistema modal-sm">

            <h4 id="msgTitulo">Mensagem</h4>
            <p id="msgTexto"></p>

            <button onclick="fecharMensagem()" class="btn btn-primary w-100">OK</button>

        </div>
    </div>

    <!-- modal excluir -->
    <div id="modalConfirmacao" class="modal-sistema hidden">
        <div class="modal-content-sistema modal-sm">

            <h4>Confirmação</h4>
            <p id="confirmTexto"></p>

            <button id="btnConfirmar" class="btn btn-danger w-100">Confirmar</button>
            <button onclick="fecharConfirmacao()" class="btn btn-secondary w-100 mt-2">Cancelar</button>

        </div>
    </div>

    <!-- JS -->
    <script src="/js/layout.js"></script>
    <script src="/js/scripts.js"></script>
    <script src="/js/cadastroFornecedor.js"></script>

</body>

</html>
